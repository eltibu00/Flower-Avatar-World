<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Avatar World 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#FF6B9D;--purple:#A855F7;--blue:#60A5FA;--yellow:#FCD34D;
  --green:#34D399;--orange:#FB923C;--red:#F87171;
  --bg1:#FFF0FB;--bg2:#F0E6FF;--panel:#FFFFFF;
  --outline:#3D1A5C;--shadow:rgba(61,26,92,0.18);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg1)}
#app{display:flex;width:100%;height:100vh;position:relative}

/* ── MAIN SCENE ── */
#scene{flex:1;position:relative;overflow:hidden;min-width:0}
#sceneCanvas{width:100%;height:100%;display:block}

/* ── TOP BAR ── */
#topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;z-index:10;pointer-events:none}
.tb-pill{background:white;border:2.5px solid var(--outline);border-radius:30px;padding:5px 14px;font-weight:800;font-size:13px;color:var(--outline);display:flex;align-items:center;gap:5px;pointer-events:all;box-shadow:3px 3px 0 var(--outline)}
.tb-pill .icon{font-size:16px}
#playerNameTag{font-family:'Fredoka One',cursive;font-size:15px;color:var(--purple)}

/* ── RIGHT PANEL ── */
#rightPanel{width:130px;background:linear-gradient(180deg,#F3E8FF 0%,#FFF0FB 100%);border-left:3px solid var(--outline);display:flex;flex-direction:column;gap:0;overflow-y:auto;flex-shrink:0}
#rightPanel::-webkit-scrollbar{width:4px}
#rightPanel::-webkit-scrollbar-thumb{background:#D8B4FE;border-radius:4px}
.rp-section{padding:8px 8px 4px}
.rp-title{font-size:10px;font-weight:900;color:var(--outline);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;opacity:.6}
.rp-btn{width:100%;background:white;border:2.5px solid var(--outline);border-radius:14px;padding:7px 6px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;color:var(--outline);display:flex;align-items:center;gap:6px;margin-bottom:6px;transition:all .15s;box-shadow:2px 2px 0 var(--outline)}
.rp-btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--outline)}
.rp-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--outline)}
.rp-btn .bi{font-size:18px}
.rp-divider{height:2px;background:linear-gradient(90deg,transparent,var(--outline),transparent);opacity:.12;margin:4px 8px}

/* Item cards */
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:0 8px 8px}
.item-card{background:white;border:2px solid var(--outline);border-radius:10px;padding:5px 4px;text-align:center;cursor:pointer;transition:all .15s;box-shadow:2px 2px 0 var(--outline);position:relative}
.item-card:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--outline)}
.item-card.new::after{content:'NEW';position:absolute;top:-4px;right:-4px;background:var(--red);color:white;font-size:7px;font-weight:900;padding:1px 4px;border-radius:6px;border:1.5px solid var(--outline)}
.item-card.owned{border-color:var(--green);background:#F0FFF9}
.item-card-icon{font-size:22px;line-height:1.2}
.item-card-name{font-size:8px;font-weight:800;color:var(--outline);margin-top:2px;line-height:1.2}
.item-card-price{font-size:8px;color:var(--purple);font-weight:900}

/* ── BOTTOM NAV ── */
#bottomNav{position:absolute;bottom:0;left:0;right:130px;display:flex;gap:8px;padding:8px 12px;background:linear-gradient(0deg,rgba(255,240,251,0.98),transparent);justify-content:center;z-index:10}
.bn-btn{background:white;border:2.5px solid var(--outline);border-radius:16px;padding:8px 14px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;color:var(--outline);display:flex;align-items:center;gap:5px;transition:all .15s;box-shadow:3px 3px 0 var(--outline)}
.bn-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--outline)}
.bn-btn.active{background:var(--purple);color:white;border-color:var(--outline)}

/* ── MODALS ── */
.modal-overlay{position:fixed;inset:0;background:rgba(61,26,92,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:white;border:3px solid var(--outline);border-radius:24px;width:min(500px,100%);max-height:85vh;overflow-y:auto;position:relative;box-shadow:6px 6px 0 var(--outline)}
.modal-header{background:linear-gradient(135deg,var(--purple),var(--pink));padding:16px 20px;border-radius:21px 21px 0 0;display:flex;align-items:center;gap:10px}
.modal-title{font-family:'Fredoka One',cursive;font-size:22px;color:white}
.modal-close{position:absolute;top:12px;right:14px;background:white;border:2px solid var(--outline);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--outline);box-shadow:2px 2px 0 var(--outline)}
.modal-body{padding:16px 20px}

/* Style options */
.style-section{margin-bottom:14px}
.style-label{font-size:11px;font-weight:900;color:var(--outline);opacity:.6;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.style-opts{display:flex;flex-wrap:wrap;gap:6px}
.sopt{background:white;border:2px solid #DDD;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;color:#555;transition:all .15s;font-family:'Nunito',sans-serif}
.sopt:hover{border-color:var(--purple)}
.sopt.active{background:#EDE0FF;border-color:var(--purple);color:var(--outline)}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s;flex-shrink:0}
.color-dot:hover{transform:scale(1.1)}
.color-dot.active{border-color:var(--outline);transform:scale(1.15);box-shadow:0 0 0 2px white,0 0 0 4px var(--purple)}
.save-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--purple),var(--pink));border:2.5px solid var(--outline);border-radius:16px;color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;cursor:pointer;box-shadow:3px 3px 0 var(--outline);margin-top:8px}
.save-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--outline)}

/* Pet bubble */
#petBubble{position:absolute;bottom:70px;left:20px;background:white;border:2.5px solid var(--outline);border-radius:16px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--outline);max-width:160px;box-shadow:3px 3px 0 var(--outline);display:none;z-index:5}
#petBubble::after{content:'';position:absolute;bottom:-10px;left:20px;border:5px solid transparent;border-top-color:var(--outline)}

/* Toast */
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--outline);color:white;padding:10px 20px;border-radius:20px;font-weight:800;font-size:13px;z-index:300;pointer-events:none;opacity:0;transition:opacity .25s;border:2px solid rgba(255,255,255,.3);white-space:nowrap}
#toast.show{opacity:1}

/* Chat */
#chatBox{position:absolute;bottom:70px;right:140px;width:260px;background:white;border:2.5px solid var(--outline);border-radius:20px;overflow:hidden;z-index:20;box-shadow:4px 4px 0 var(--outline);display:none}
#chatHead{background:linear-gradient(135deg,var(--purple),var(--pink));padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer}
#chatHead span{color:white;font-weight:800;font-size:13px}
#chatMsgs{height:160px;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px}
.cmsg{padding:7px 11px;border-radius:12px;font-size:12px;max-width:85%;line-height:1.4;font-weight:700;border:1.5px solid var(--outline)}
.cmsg-npc{background:#EDE0FF;color:var(--outline);align-self:flex-start;border-radius:12px 12px 12px 3px}
.cmsg-me{background:linear-gradient(135deg,var(--purple),var(--pink));color:white;align-self:flex-end;border-radius:12px 12px 3px 12px}
#chatFoot{display:flex;border-top:2px solid #EEE;padding:7px}
#chatFoot input{flex:1;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;outline:none;color:var(--outline);padding:3px 6px}
#chatFoot button{background:var(--purple);border:none;border-radius:8px;padding:5px 10px;color:white;font-weight:800;cursor:pointer;font-size:11px}

/* Game panels */
.game-panel{background:#1a1a2e;border-radius:0 0 21px 21px}
.gbtn{background:linear-gradient(135deg,var(--purple),var(--pink));border:2.5px solid var(--outline);border-radius:12px;padding:10px 20px;color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;box-shadow:3px 3px 0 var(--outline);margin:4px}
.gbtn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--outline)}
.mem-card{width:56px;height:56px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;background:#2d2d5e;border:2.5px solid #555;transition:all .2s;box-shadow:2px 2px 0 #000}
.mem-card.flipped{background:#4a3080;border-color:#A855F7}
.mem-card.matched{background:#14532d;border-color:#34D399}

/* Sparkle anim */
@keyframes sparkle{0%{transform:scale(0) rotate(0);opacity:1}100%{transform:scale(1.5) rotate(180deg);opacity:0}}
.sparkle{position:absolute;pointer-events:none;font-size:16px;animation:sparkle .6s forwards}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes petBounce{0%,100%{transform:translateY(0) scaleX(1)}50%{transform:translateY(-5px) scaleX(1.05)}}
@keyframes coinPop{0%{transform:scale(0) translateY(0);opacity:1}100%{transform:scale(1.2) translateY(-30px);opacity:0}}
@keyframes slideDown{0%{transform:translateX(-50%) translateY(-20px);opacity:0}100%{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>
<body>
<div id="app">
  <!-- MAIN SCENE -->
  <div id="scene">
    <canvas id="sceneCanvas"></canvas>

    <!-- Top bar -->
    <div id="topbar">
      <div class="tb-pill"><span class="icon">👧</span><span id="playerNameTag">My Avatar</span></div>
      <div class="tb-pill"><span class="icon">🪙</span><span id="coinCount">50</span></div>
      <div class="tb-pill" style="flex-direction:column;gap:2px;padding:4px 12px">
        <div style="display:flex;align-items:center;gap:5px">
          <span style="font-size:12px">⭐</span>
          <span id="levelBadge" style="font-family:'Fredoka One',cursive;color:#A855F7;font-size:14px">Lv.1</span>
          <span id="starCount" style="font-size:11px;color:#888">0🏆</span>
        </div>
        <div style="width:80px;height:6px;background:#EEE;border-radius:4px;border:1px solid #DDD;overflow:hidden">
          <div id="xpBar" style="height:100%;width:0%;background:linear-gradient(90deg,#A855F7,#FF6B9D);border-radius:4px;transition:width .4s"></div>
        </div>
      </div>
    </div>

    <!-- Pet speech bubble -->
    <div id="petBubble">Hello! 🐾</div>

    <!-- Chat box -->
    <div id="chatBox">
      <div id="chatHead" onclick="toggleChat()">
        <span id="chatNpcIco">🧙‍♀️</span>
        <span id="chatNpcNm">Zara</span>
        <span style="margin-left:auto;opacity:.7;font-size:11px">▼</span>
      </div>
      <div id="chatMsgs"></div>
      <div id="chatFoot">
        <input id="chatIn" placeholder="Say something..." onkeydown="if(event.key==='Enter')sendChat()"/>
        <button onclick="sendChat()">→</button>
      </div>
    </div>

    <!-- Bottom nav -->
    <div id="bottomNav">
      <button class="bn-btn active" onclick="setTab('home')">🏠 Home</button>
      <button class="bn-btn" onclick="setTab('style')">💄 Style</button>
      <button class="bn-btn" onclick="setTab('games')">🎮 Games</button>
      <button class="bn-btn" onclick="setTab('world')">🗺️ Walk</button>
    </div>
    <!-- Joystick -->
    <div id="joystick" style="position:absolute;bottom:80px;left:16px;width:90px;height:90px;z-index:20">
      <div id="joyBase" style="width:90px;height:90px;border-radius:50%;background:rgba(0,0,0,0.3);border:3px solid rgba(255,255,255,0.4);position:absolute"></div>
      <div id="joyStick" style="width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.7);border:3px solid rgba(61,26,92,0.6);position:absolute;top:26px;left:26px;touch-action:none"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="rightPanel">
    <div class="rp-section">
      <div class="rp-title">Quick</div>
      <button class="rp-btn" onclick="openStyle()"><span class="bi">💄</span>Style</button>
      <button class="rp-btn" onclick="openShop()"><span class="bi">🛍️</span>Shop</button>
      <button class="rp-btn" onclick="openGames()"><span class="bi">🎮</span>Games</button>
      <button class="rp-btn" onclick="talkToPet()"><span class="bi">🐾</span>Pet</button>
      <button class="rp-btn" onclick="openWorlds()"><span class="bi">🌍</span>Worlds</button>
      <button class="rp-btn" onclick="openAchievements()"><span class="bi">🏆</span>Goals</button>
    </div>
    <div class="rp-divider"></div>
    <div class="rp-section">
      <div class="rp-title">My Items</div>
    </div>
    <div class="item-grid" id="itemGrid"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── PALETTES ──────────────────────────────────────────────
const SKIN=['#FDDBB4','#F5C397','#E8A97E','#C68642','#8D5524','#4A2912'];
const HAIR=['#2C1A0E','#6B3A2A','#C47B2B','#E8C882','#FF69B4','#9B59B6','#CCCCCC','#FF4500','#1A1A2E','#E8E8E8'];
const OC=['#FF6B9D','#A855F7','#60A5FA','#34D399','#FB923C','#F87171','#FCD34D','#EC4899','#8B5CF6','#06B6D4'];
const SC=['#3D1A5C','#8B4513','#FF6B9D','#60A5FA','#FFFFFF','#FFD700','#A855F7','#34D399'];
const LC=['#FF6B9D','#E8739A','#C0392B','#FF69B4','#8B0000','#A855F7','#FF8C42','#FF4444'];
const NC=['#FF6B9D','#A855F7','#FF69B4','#FFD700','#34D399','#60A5FA','#FB923C','#FFFFFF','#3D1A5C','#EC4899'];

// ── STATE ─────────────────────────────────────────────────
const G={
  name:'Starlight',coins:50,stars:0,
  skin:0,hairStyle:'waves',hairColor:4,
  outfit:'sundress',outfitColor:0,shoe:'heels',shoeColor:0,
  acc:'none',expr:'happy',lipColor:0,nails:0,blush:'soft',earrings:'drops',lashes:true,
  pet:'bunny',petName:'Fluffy',
  owned:['none','happy'],items:[],
  scene:'garden',nearNPC:null,chatNPC:null,
  // Progression
  xp:0, level:1, xpToNext:100,
  achievements:[],
  dailyCoins:0, lastLogin:'',
  activeWorld:'garden',
  indoor:null,
  transition:0,
  // Walking system
  ax:0.5, ay:0.88,        // avatar position (0-1 of world)
  tx:0.5, ty:0.88,        // target position (tap-to-walk)
  walkFrame:0,             // animation frame
  facing:'down',           // up/down/left/right
  isWalking:false,
  camX:0, camY:0,          // camera offset in world pixels
  worldW:1400, worldH:900, // scrollable world size
};

// Buildings on the garden scene (positions as % of W/H)
const BUILDINGS=[
  {id:'townhall', label:'🏠 Town Hall',   x:.18, y:.38, w:.13, h:.18, color:'#F9E4F0', roof:'#C0392B',
   interior:{bg:'#FFF8F0',floor:'#D4A96A',wallColor:'#F9E4F0',roofColor:'#C0392B',
     desc:'The cozy Town Hall! Check the notice board for tips.',
     npc:{icon:'👩‍💼',name:'Mayor Rose',msg:'Welcome! This town is full of magic and adventure! 🌸'},
     items:[{x:.3,y:.55,icon:'📋',label:'Notice Board',msg:'🌟 Tip: Collect coins by tapping them!\n🎮 Play mini games for bonus coins!\n💄 Customize in Style Studio!'}],
     coins:3}},
  {id:'garden_hut', label:'🌿 Garden Hut', x:.33, y:.42, w:.11, h:.16, color:'#D5E8D4', roof:'#27AE60',
   interior:{bg:'#F0FFF4',floor:'#86EFAC',wallColor:'#D5E8D4',roofColor:'#27AE60',
     desc:'A peaceful flower garden cottage!',
     npc:{icon:'🧝‍♀️',name:'Flora',msg:'Welcome to my garden! 🌸 Pick the glowing flowers to earn coins!'},
     items:[{x:.25,y:.5,icon:'🌸',label:'Pink Rose',msg:'A beautiful pink rose! +2 🪙'},{x:.55,y:.6,icon:'🌻',label:'Sunflower',msg:'So sunny and bright! +2 🪙'},{x:.7,y:.45,icon:'🌺',label:'Hibiscus',msg:'Gorgeous hibiscus! +2 🪙'}],
     coins:2}},
  {id:'arcade', label:'🎮 Arcade',       x:.62, y:.4,  w:.12, h:.17, color:'#DAE8FC', roof:'#2980B9',
   interior:{bg:'#1a1a2e',floor:'#2d2d5e',wallColor:'#1a1a40',roofColor:'#2980B9',
     desc:'The neon Arcade! Play games to win coins!',
     npc:{icon:'🤖',name:'Pixel Bot',msg:'BEEP BOOP! Play my games to earn MAXIMUM coins! 🎮'},
     items:[{x:.2,y:.5,icon:'🕹️',label:'Play Memory',action:'startMemory'},{x:.5,y:.5,icon:'🔢',label:'Number Dash',action:'startMath'},{x:.78,y:.5,icon:'🌈',label:'Color Game',action:'startColor'}],
     coins:0}},
  {id:'market', label:'🛍️ Market',       x:.48, y:.55, w:.13, h:.17, color:'#FFE6CC', roof:'#E67E22',
   interior:{bg:'#FFF8F0',floor:'#FDE68A',wallColor:'#FFE6CC',roofColor:'#E67E22',
     desc:'The village market — buy cute items!',
     npc:{icon:'🦊',name:'Fox Merchant',msg:'Welcome to my shop! Best prices in town! 🛍️'},
     items:[],
     coins:0, isShop:true}},
  {id:'magic', label:'🔮 Magic Shop',    x:.72, y:.5,  w:.12, h:.16, color:'#E1D5E7', roof:'#8E44AD',
   interior:{bg:'#1E1040',floor:'#2d1a5e',wallColor:'#3D1A5C',roofColor:'#8E44AD',
     desc:'The mysterious magic shop — unlock rare items!',
     npc:{icon:'🧙‍♀️',name:'Zara',msg:'Ahh, you found my secret shop! ✨ Magic items are hidden here...'},
     items:[{x:.3,y:.5,icon:'✨',label:'Sparkle Dust',msg:'A sprinkle of magic! +10 🪙'},{x:.6,y:.5,icon:'🔮',label:'Crystal Ball',msg:'It shows... your avatar looking amazing! +5 🪙'}],
     coins:5}},
];

// ── ACHIEVEMENTS ─────────────────────────────────────────
const ACHIEVEMENTS=[
  {id:'first_coin',   icon:'🪙', name:'First Coin!',      desc:'Collect your first coin',         xp:20,  check:()=>G.coins>=5},
  {id:'coin_100',     icon:'💰', name:'Rich Girl',         desc:'Collect 100 coins total',          xp:50,  check:()=>G.totalCoins>=100},
  {id:'coin_500',     icon:'💎', name:'Treasure Hunter',   desc:'Collect 500 coins total',          xp:150, check:()=>G.totalCoins>=500},
  {id:'first_house',  icon:'🏠', name:'Explorer',          desc:'Enter a building for the first time', xp:30, check:()=>G.totalEntered>=1},
  {id:'all_houses',   icon:'🗺️', name:'World Traveler',    desc:'Enter all 5 buildings',            xp:100, check:()=>G.totalEntered>=5},
  {id:'space_visit',  icon:'🚀', name:'Space Cadet',       desc:'Visit the Space Station world',    xp:80,  check:()=>G.visitedWorlds?.includes('space')},
  {id:'first_game',   icon:'🎮', name:'Game On!',          desc:'Play your first mini game',        xp:25,  check:()=>G.gamesPlayed>=1},
  {id:'game_5',       icon:'🏅', name:'Game Champ',        desc:'Play 5 mini games',                xp:75,  check:()=>G.gamesPlayed>=5},
  {id:'first_item',   icon:'🛍️', name:'Shopaholic',        desc:'Buy your first item',              xp:30,  check:()=>G.owned.length>=3},
  {id:'level_5',      icon:'⭐', name:'Rising Star',       desc:'Reach Level 5',                   xp:200, check:()=>G.level>=5},
  {id:'level_10',     icon:'👑', name:'Avatar Queen',      desc:'Reach Level 10',                  xp:500, check:()=>G.level>=10},
  {id:'pet_talk',     icon:'🐾', name:'Pet Whisperer',     desc:'Talk to your pet 5 times',         xp:40,  check:()=>G.petTalks>=5},
  {id:'style_change', icon:'💄', name:'Fashion Icon',      desc:'Change your style 3 times',        xp:35,  check:()=>G.styleChanges>=3},
  {id:'daily_3',      icon:'📅', name:'Regular!',          desc:'Log in 3 days in a row',           xp:100, check:()=>G.loginStreak>=3},
];

// Track extra stats
Object.assign(G, {totalCoins:50, totalEntered:0, gamesPlayed:0, petTalks:0, styleChanges:0, loginStreak:1, visitedWorlds:['garden']});

function gainXP(amount){
  G.xp+=amount;
  while(G.xp>=G.xpToNext){
    G.xp-=G.xpToNext;
    G.level++;
    G.xpToNext=Math.floor(100*Math.pow(1.3,G.level-1));
    G.coins+=G.level*10;
    document.getElementById('coinCount').textContent=G.coins;
    showLevelUp();
  }
  updateHUD();
}

function checkAchievements(){
  ACHIEVEMENTS.forEach(a=>{
    if(!G.achievements.includes(a.id)&&a.check()){
      G.achievements.push(a.id);
      gainXP(a.xp);
      showAchievementPopup(a);
    }
  });
}

function showAchievementPopup(a){
  const el=document.createElement('div');

// ── POLYFILLS ─────────────────────────────────────────────
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
    return this;
  };
}

function dk(hex,a=40){if(hex.startsWith('rgb')){const m=hex.match(/\d+/g);return`rgb(${Math.max(0,+m[0]-a)},${Math.max(0,+m[1]-a)},${Math.max(0,+m[2]-a)})`;}const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;}
function lt(hex,a=40){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}

function drawGarden(){
  const W=G.worldW, H=G.worldH;
  // Sky gradient
  const sky=ctx.createLinearGradient(0,0,0,H*.55);
  sky.addColorStop(0,'#B3E5FC');sky.addColorStop(1,'#E8F5FF');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*.55);
  // Clouds
  ctx.fillStyle='rgba(255,255,255,0.85)';
  [[W*.15,H*.1,50],[W*.45,H*.07,35],[W*.7,H*.12,45],[W*.85,H*.08,30]].forEach(([cx,cy,r])=>{
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+r*.6,cy+5,r*.7,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx-r*.5,cy+8,r*.6,0,Math.PI*2);ctx.fill();
  });
  // Sun
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(W*.88,H*.1,28,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFA500';ctx.font='bold 14px Nunito';
  for(let i=0;i<8;i++){ctx.save();ctx.translate(W*.88,H*.1);ctx.rotate(i*Math.PI/4);ctx.fillRect(-2,32,4,12);ctx.restore();}
  // Ground gradient
  const gnd=ctx.createLinearGradient(0,H*.5,0,H);
  gnd.addColorStop(0,'#86EFAC');gnd.addColorStop(.4,'#4ADE80');gnd.addColorStop(1,'#16A34A');
  ctx.fillStyle=gnd;ctx.fillRect(0,H*.5,W,H*.5);
  // Path
  const path=ctx.createLinearGradient(0,0,0,H);
  path.addColorStop(0,'#FDE68A');path.addColorStop(1,'#F59E0B');
  ctx.fillStyle=path;
  ctx.beginPath();ctx.moveTo(W*.4,H*.5);ctx.bezierCurveTo(W*.42,H*.7,W*.45,H*.85,W*.43,H);ctx.lineTo(W*.57,H);ctx.bezierCurveTo(W*.55,H*.85,W*.58,H*.7,W*.6,H*.5);ctx.closePath();ctx.fill();
  // Path dots
  ctx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<6;i++) ctx.beginPath(),ctx.ellipse(W*.5,H*(.55+i*.07),8,3,0,0,Math.PI*2),ctx.fill();
  // Big trees
  [[W*.08,H*.42],[W*.18,H*.38],[W*.78,H*.4],[W*.88,H*.44]].forEach(([tx,ty])=>{
    ctx.fillStyle='#92400E';ctx.fillRect(tx-8,ty+20,16,60);
    ctx.fillStyle='#166534';ctx.beginPath();ctx.arc(tx,ty,36,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#15803D';ctx.beginPath();ctx.arc(tx,ty-18,26,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#16A34A';ctx.beginPath();ctx.arc(tx,ty-30,18,0,Math.PI*2);ctx.fill();
    // Outline
    ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;ctx.beginPath();ctx.arc(tx,ty,36,0,Math.PI*2);ctx.stroke();
  });
  // Flowers big
  const fcols=['#FF6B9D','#A855F7','#FB923C','#FCD34D','#60A5FA','#F87171'];
  for(let i=0;i<18;i++){
    const fx=W*(.05+Math.random()*.35+Math.floor(i/9)*.55);
    const fy=H*(.52+Math.random()*.3);
    const fc=fcols[i%6];
    ctx.fillStyle='#4ADE80';ctx.fillRect(fx-2,fy-12,4,20);
    for(let p=0;p<5;p++){ctx.fillStyle=fc;ctx.beginPath();ctx.ellipse(fx+Math.cos(p*Math.PI*.4)*8,fy-8+Math.sin(p*Math.PI*.4)*8,5,7,p*Math.PI*.4,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(fx,fy-8,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#3D1A5C';ctx.lineWidth=1;ctx.beginPath();ctx.arc(fx,fy-8,4,0,Math.PI*2);ctx.stroke();
  }
  // Rainbow arch
  const colors=['#FF6B9D','#FB923C','#FCD34D','#34D399','#60A5FA','#A855F7'];
  colors.forEach((c,i)=>{
    ctx.strokeStyle=c;ctx.lineWidth=5;ctx.globalAlpha=.7;
    ctx.beginPath();ctx.arc(W*.5,H*.5,W*.28-i*6,Math.PI,0);ctx.stroke();
  });
  ctx.globalAlpha=1;
  // Fence
  ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;
  for(let i=0;i<Math.floor(W/30);i++){
    const fx=i*30+10;
    ctx.fillStyle='#FEF9EE';ctx.beginPath();ctx.roundRect(fx,H*.5,14,35,3);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.roundRect(fx,H*.46,14,12,3);ctx.fill();ctx.stroke();
  }
  ctx.fillStyle='#D4A96A';ctx.fillRect(0,H*.535,W,8);ctx.strokeRect(0,H*.535,W,8);

  // ── BUILDINGS ──
  BUILDINGS.forEach(b=>{
    const bx=b.x*W, by=b.y*H, bw=b.w*W, bh=b.h*H;
    // Shadow
    ctx.fillStyle='rgba(61,26,92,0.15)';ctx.fillRect(bx+5,by+5,bw,bh);
    // Wall
    ctx.fillStyle=b.color;ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,6);ctx.fill();ctx.stroke();
    // Roof
    ctx.fillStyle=b.roof;ctx.beginPath();
    ctx.moveTo(bx-8,by);ctx.lineTo(bx+bw/2,by-bh*.38);ctx.lineTo(bx+bw+8,by);ctx.closePath();ctx.fill();ctx.stroke();
    // Windows
    ctx.fillStyle='#ADE8F4';ctx.strokeStyle='#3D1A5C';ctx.lineWidth=1.5;
    [[bx+bw*.18,by+bh*.2],[bx+bw*.62,by+bh*.2]].forEach(([wx,wy])=>{
      ctx.beginPath();ctx.roundRect(wx,wy,bw*.22,bh*.25,3);ctx.fill();ctx.stroke();
      ctx.strokeStyle='rgba(61,26,92,.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(wx+bw*.11,wy);ctx.lineTo(wx+bw*.11,wy+bh*.25);ctx.stroke();
      ctx.beginPath();ctx.moveTo(wx,wy+bh*.12);ctx.lineTo(wx+bw*.22,wy+bh*.12);ctx.stroke();
      ctx.strokeStyle='#3D1A5C';ctx.lineWidth=1.5;
    });
    // Door
    ctx.fillStyle='#8B6340';ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(bx+bw*.38,by+bh*.6,bw*.24,bh*.4,4);ctx.fill();ctx.stroke();
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(bx+bw*.38+bw*.18,by+bh*.8,3,0,Math.PI*2);ctx.fill();
    // Label
    ctx.fillStyle='#3D1A5C';ctx.font=`bold ${Math.max(10,bw*.08)}px Nunito`;ctx.textAlign='center';
    ctx.fillText(b.label,bx+bw/2,by+bh+16);
    // Enter prompt glow
    const nearDoor=G.nearBuilding===b.id;
    if(nearDoor){
      ctx.fillStyle='rgba(255,215,0,0.18)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,6);ctx.fill();
      ctx.fillStyle='#FFD700';ctx.font='bold 13px Nunito';ctx.textAlign='center';
      ctx.fillText('👆 Tap to enter!',bx+bw/2,by-12);
    }
  });
}

function drawBeach(){

  const sky=ctx.createLinearGradient(0,0,0,H*.5);
  sky.addColorStop(0,'#38BDF8');sky.addColorStop(1,'#7DD3FC');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*.5);
  ctx.fillStyle='#FDE68A';ctx.fillRect(0,H*.5,W,H*.5);
  ctx.fillStyle='#38BDF8';ctx.beginPath();ctx.ellipse(W*.5,H*.52,W*.55,H*.12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';for(let i=0;i<5;i++){ctx.fillRect(W*(i*.18+.05),H*.48,W*.12,6);}
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(W*.8,H*.15,35,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;ctx.beginPath();ctx.arc(W*.8,H*.15,35,0,Math.PI*2);ctx.stroke();
  // Palm
  ctx.strokeStyle='#92400E';ctx.lineWidth=8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(W*.15,H*.7);ctx.bezierCurveTo(W*.12,H*.5,W*.18,H*.35,W*.2,H*.2);ctx.stroke();
  ctx.fillStyle='#16A34A';ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;
  [[-30,0],[0,-15],[30,0],[15,20],[-15,20]].forEach(([lx,ly])=>{ctx.beginPath();ctx.ellipse(W*.2+lx,H*.2+ly,30,10,lx*.03,0,Math.PI*2);ctx.fill();ctx.stroke();});
}

function drawNight(){
  const W=G.worldW, H=G.worldH;
  const sky=ctx.createLinearGradient(0,0,0,H*.6);
  sky.addColorStop(0,'#0F0A1E');sky.addColorStop(1,'#1E1040');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*.6);
  ctx.fillStyle='#1E3A5F';ctx.fillRect(0,H*.55,W,H*.45);
  // Stars
  ctx.fillStyle='white';for(let i=0;i<50;i++){const sz=Math.random()*2+.5;ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H*.5,sz,0,Math.PI*2);ctx.fill();}
  // Moon
  ctx.fillStyle='#FEF9C3';ctx.beginPath();ctx.arc(W*.8,H*.12,30,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1E1040';ctx.beginPath();ctx.arc(W*.86,H*.1,26,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#4ADE80';ctx.fillRect(0,H*.6,W,H*.4);
  // Fireflies
  const t=Date.now()/600;
  for(let i=0;i<12;i++){ctx.fillStyle=`rgba(255,255,100,${0.5+Math.sin(t+i)*0.5})`;ctx.beginPath();ctx.arc(W*(.1+i*.07+Math.sin(t+i)*.03),H*(.65+Math.sin(t*1.3+i)*.1),3,0,Math.PI*2);ctx.fill();}
}


// ── SPACE STATION SCENE ──────────────────────────────────
function drawSpace(){
  const W=G.worldW, H=G.worldH;
  // Deep space bg
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#020818');sky.addColorStop(1,'#0F0A2E');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Stars
  for(let i=0;i<200;i++){
    const sz=Math.random()*2.5+.3;
    const blink=0.5+Math.sin(Date.now()/500+i)*0.5;
    ctx.fillStyle='rgba(255,255,255,'+blink+')';
    ctx.beginPath();ctx.arc((i*137.5%W),(i*97.3%H),sz,0,Math.PI*2);ctx.fill();
  }
  // Nebula clouds
  [['rgba(168,85,247,0.12)',W*.2,H*.3,180],['rgba(255,107,157,0.1)',W*.7,H*.6,220],['rgba(96,165,250,0.1)',W*.5,H*.2,150]].forEach(([c,x,y,r])=>{
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,c);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });
  // Planets
  [[W*.15,H*.25,55,'#FB923C','#C2410C'],[W*.8,H*.5,40,'#60A5FA','#2563EB'],[W*.55,H*.15,28,'#34D399','#059669']].forEach(([px,py,pr,c1,c2])=>{
    ctx.fillStyle=c1;ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px,py,pr,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle=c2;ctx.beginPath();ctx.ellipse(px,py+pr*.1,pr*.8,pr*.2,-.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(px-pr*.2,py-pr*.3,pr*.25,pr*.15,-.5,0,Math.PI*2);ctx.fill();
  });
  // Space station platform (ground)
  ctx.fillStyle='#1E293B';ctx.fillRect(0,H*.65,W,H*.35);
  ctx.fillStyle='#334155';
  for(let i=0;i<10;i++) ctx.fillRect(i*W/10,H*.65,W/10-2,8);
  // Station windows
  for(let i=0;i<6;i++){
    ctx.fillStyle='rgba(96,165,250,0.6)';ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(W*(i*.15+.05),H*.68,60,40,5);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.roundRect(W*(i*.15+.05)+4,H*.68+4,20,14,3);ctx.fill();
  }
  // Rocket
  ctx.fillStyle='#E2E8F0';ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(W*.88,H*.4,36,80,4);ctx.fill();ctx.stroke();
  ctx.fillStyle='#F87171';ctx.beginPath();ctx.moveTo(W*.88,H*.4);ctx.lineTo(W*.88+18,H*.4-30);ctx.lineTo(W*.88+36,H*.4);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#60A5FA';ctx.beginPath();ctx.roundRect(W*.88+10,H*.45,16,16,8);ctx.fill();ctx.stroke();
  // Shooting star
  const st=Date.now()/20%W;
  ctx.strokeStyle='rgba(255,255,200,0.8)';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(st,H*.1);ctx.lineTo(st-60,H*.1+20);ctx.stroke();
  // Floating coins special
  ctx.fillStyle='#FFD700';ctx.font='20px serif';ctx.textAlign='center';
  const bob2=Math.sin(Date.now()/400)*8;
  ctx.fillText('🌟',W*.45,H*.55+bob2);ctx.fillText('🌟',W*.25,H*.6-bob2);ctx.fillText('🌟',W*.65,H*.58+bob2*.5);
}

// ── DRAW INDOOR ROOM ─────────────────────────────────────
function drawIndoor(bld){
  const rm=bld.interior;
  // Floor + walls
  ctx.fillStyle=rm.wallColor;ctx.fillRect(0,0,W,H);
  // Back wall (lighter)
  ctx.fillStyle=rm.bg;ctx.fillRect(W*.05,H*.08,W*.9,H*.55);
  ctx.strokeStyle='#3D1A5C';ctx.lineWidth=3;ctx.strokeRect(W*.05,H*.08,W*.9,H*.55);
  // Floor
  ctx.fillStyle=rm.floor;ctx.fillRect(0,H*.6,W,H*.4);
  ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;ctx.strokeRect(0,H*.6,W,H*.4);
  // Floor planks
  ctx.strokeStyle='rgba(61,26,92,0.15)';ctx.lineWidth=1;
  for(let i=0;i<6;i++) ctx.beginPath(),ctx.moveTo(0,H*(.65+i*.06)),ctx.lineTo(W,H*(.65+i*.06)),ctx.stroke();
  for(let i=0;i<8;i++) ctx.beginPath(),ctx.moveTo(W*(i/8),H*.6),ctx.lineTo(W*(i/8),H),ctx.stroke();
  // Wall decorations
  ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;
  // Window on wall
  ctx.fillStyle='#ADE8F4';ctx.beginPath();ctx.roundRect(W*.12,H*.15,W*.18,H*.28,4);ctx.fill();ctx.stroke();
  ctx.strokeStyle='rgba(61,26,92,.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W*.21,H*.15);ctx.lineTo(W*.21,H*.43);ctx.stroke();
  ctx.beginPath();ctx.moveTo(W*.12,H*.29);ctx.lineTo(W*.3,H*.29);ctx.stroke();
  ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;
  // Curtains
  ctx.fillStyle=rm.roofColor+'99';

// ── SCENE COINS ──────────────────────────────────────────
const SCENE_COINS=[];
function spawnSceneCoins(){SCENE_COINS.length=0;for(let i=0;i<8;i++)SCENE_COINS.push({x:.1+Math.random()*.8,y:.55+Math.random()*.35,col:false});}
spawnSceneCoins();

// ── WALKING SYSTEM ───────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  e.preventDefault && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key) && e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// Tap to walk
canvas.addEventListener('click',e=>{
  if(G.indoor){
    const rect=canvas.getBoundingClientRect();
    const scaleX=W/(rect.right-rect.left), scaleY=H/(rect.bottom-rect.top);
    const cx=(e.clientX-rect.left)*scaleX, cy=(e.clientY-rect.top)*scaleY;
    const mx=cx/W, my=cy/H;
    const bld=BUILDINGS.find(b=>b.id===G.indoor);
    if(!bld) return;
    const rm=bld.interior;
    if(mx>.4&&mx<.6&&my>.75){enterBuilding(null);return;}
    if(rm.npc&&mx>.62&&mx<.88&&my>.45&&my<.72){openIndoorChat(rm.npc,bld);return;}
    if(rm.isShop){openShop();return;}
    rm.items&&rm.items.forEach(item=>{
      if(Math.hypot(mx-item.x,my-item.y)<.1){
        if(item.action){
          if(item.action==='startMemory')startMemory();
          else if(item.action==='startMath')startMath();
          else if(item.action==='startColor')startColor();
        } else {
          G.coins+=rm.coins||2;document.getElementById('coinCount').textContent=G.coins;
          spawnSparkle(item.x*W,item.y*H);showToast(item.msg||'Found something!');
        }
      }
    });
    return;
  }
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/(rect.right-rect.left);
  const scaleY=H/(rect.bottom-rect.top);
  const cx=(e.clientX-rect.left)*scaleX;
  const cy=(e.clientY-rect.top)*scaleY;
  // Convert canvas coords to world coords
  const wx=(cx+G.camX)/G.worldW;
  const wy=(cy+G.camY)/G.worldH;
  G.tx=Math.max(0.02,Math.min(0.98,wx));
  G.ty=Math.max(0.05,Math.min(0.95,wy));
  G.isWalking=true;
  // Check coin tap
  SCENE_COINS.forEach((c,i)=>{
    const cx2=c.x*G.worldW-G.camX, cy2=c.y*G.worldH-G.camY;
    if(!c.col&&Math.hypot(cx-cx2,cy-cy2)<30){
      c.col=true;G.coins+=5;document.getElementById('coinCount').textContent=G.coins;
      spawnSparkle(cx2,cy2);showToast('+5 🪙');
      setTimeout(()=>{c.x=.1+Math.random()*.8;c.y=.4+Math.random()*.45;c.col=false;},7000);
    }
  });
  // Check NPC tap
  NPCS.forEach(npc=>{
    const nx=npc.x*G.worldW-G.camX, ny=npc.y*G.worldH-G.camY;
    if(Math.hypot(cx-nx,cy-ny)<50) openChatFor(npc.id);
  });
  // Check building tap
  BUILDINGS.forEach(b=>{
    const bx=b.x*G.worldW-G.camX, by=b.y*G.worldH-G.camY;
    const bw=b.w*G.worldW, bh=b.h*G.worldH;
    if(cx>bx&&cx<bx+bw&&cy>by&&cy<by+bh) G.tx=b.x+b.w/2, G.ty=b.y+b.h*.9;
  });
});

// Joystick setup
let joyActive=false, joyDx=0, joyDy=0;
const joyStick=document.getElementById('joyStick');
const joyBase=document.getElementById('joyBase');
function getJoyCenter(){
  const r=joyBase.getBoundingClientRect();
  return{x:r.left+r.width/2, y:r.top+r.height/2};
}
joyStick.addEventListener('pointerdown',e=>{
  joyActive=true; joyStick.setPointerCapture(e.pointerId); e.preventDefault();
});
window.addEventListener('pointermove',e=>{
  if(!joyActive)return;
  const c=getJoyCenter();
  const dx=e.clientX-c.x, dy=e.clientY-c.y;
  const dist=Math.min(32,Math.hypot(dx,dy));
  const angle=Math.atan2(dy,dx);
  joyDx=Math.cos(angle)*(dist/32);
  joyDy=Math.sin(angle)*(dist/32);
  joyStick.style.left=(26+joyDx*26)+'px';
  joyStick.style.top=(26+joyDy*26)+'px';
});
window.addEventListener('pointerup',()=>{
  if(!joyActive)return;
  joyActive=false; joyDx=0; joyDy=0;
  joyStick.style.left='26px'; joyStick.style.top='26px';
});

function updateWalking(){
  if(G.indoor) return;
  const spd=0.003;
  let dx=0, dy=0;
  // Keyboard
  if(keys['ArrowLeft']||keys['a']||keys['A']){dx=-spd;G.facing='left';}
  if(keys['ArrowRight']||keys['d']||keys['D']){dx=spd;G.facing='right';}
  if(keys['ArrowUp']||keys['w']||keys['W']){dy=-spd;G.facing='up';}
  if(keys['ArrowDown']||keys['s']||keys['S']){dy=spd;G.facing='down';}
  // Joystick
  if(joyActive){
    dx+=joyDx*spd; dy+=joyDy*spd;
    if(Math.abs(joyDx)>Math.abs(joyDy)) G.facing=joyDx>0?'right':'left';
    else if(Math.abs(joyDy)>0.1) G.facing=joyDy>0?'down':'up';
  }
  // Tap-to-walk
  if(G.isWalking&&!joyActive&&dx===0&&dy===0){
    const ddx=G.tx-G.ax, ddy=G.ty-G.ay;
    const dist=Math.hypot(ddx,ddy);
    if(dist>0.01){
      dx=ddx/dist*spd; dy=ddy/dist*spd;
      if(Math.abs(ddx)>Math.abs(ddy)) G.facing=ddx>0?'right':'left';
      else G.facing=ddy>0?'down':'up';
    } else {
      G.isWalking=false;
    }
  }
  if(dx!==0||dy!==0){
    G.ax=Math.max(0.02,Math.min(0.98,G.ax+dx));
    G.ay=Math.max(0.05,Math.min(0.95,G.ay+dy));
    G.walkFrame++;
    G.isWalking=true;
  } else if(!joyActive) {
    G.isWalking=false;
  }
  // Camera follows avatar — avatar stays center screen
  const wW=G.worldW, wH=G.worldH;
  const targetCamX=G.ax*wW - W/2;
  const targetCamY=G.ay*wH - H/2;
  G.camX=Math.max(0,Math.min(wW-W,targetCamX));
  G.camY=Math.max(0,Math.min(wH-H,targetCamY));
  // Building entry — only when very close to door AND pressing toward it
  if(!G.transitioning && !G.entryCooldown){
    BUILDINGS.forEach(b=>{
      const doorX=(b.x+b.w/2), doorY=(b.y+b.h);
      const dist=Math.hypot(G.ax-doorX, G.ay-doorY);
      // Must be within 0.025 of the door (much tighter radius)
      if(dist<0.025){
        G.entryCooldown=true;
        G.totalEntered=(G.totalEntered||0)+1;
        gainXP(10);checkAchievements();
        setTimeout(()=>G.entryCooldown=false, 3000);
        enterBuilding(b.id);
      }
    });
  }
  // Building proximity glow (larger radius than entry)
  G.nearBuilding=null;
  if(!G.transitioning && !G.entryCooldown){
    BUILDINGS.forEach(b=>{
      const doorX=(b.x+b.w/2), doorY=(b.y+b.h);
      if(Math.hypot(G.ax-doorX,G.ay-doorY)<0.07) G.nearBuilding=b.id;
    });
  }
  // NPC proximity
  G.nearNPC=null;
  NPCS.forEach(npc=>{
    if(Math.hypot(G.ax-npc.x,G.ay-npc.y)<0.08) G.nearNPC=npc.id;
  });
  // Coin pickup (auto when walking over)
  SCENE_COINS.forEach((c,i)=>{
    if(!c.col&&Math.hypot(G.ax-c.x,G.ay-c.y)<0.04){
      c.col=true;G.coins+=5;G.totalCoins+=5;document.getElementById('coinCount').textContent=G.coins;
      gainXP(2);checkAchievements();
      spawnSparkle((c.x*G.worldW-G.camX),(c.y*G.worldH-G.camY));
      showToast('+5 🪙 +2 XP');
      setTimeout(()=>{c.x=.1+Math.random()*.8;c.y=.4+Math.random()*.45;c.col=false;},7000);
    }
  });
}

// ── MAIN DRAW ────────────────────────────────────────────
let frame=0;
function draw(){
  frame++;
  const t=Date.now()/600;
  ctx.clearRect(0,0,W,H);
  updateWalking();

  if(G.indoor){
    // ── INDOOR MODE ──
    const bld=BUILDINGS.find(b=>b.id===G.indoor);
    if(bld) drawIndoor(bld);
    drawAvatar(W*.42,H*.88,.75,G);
    const petFn=PETS[G.pet||'bunny']?.draw||drawBunny;
    petFn(ctx,W*.26,H*.85,.52,t);
    if(G.transition>0){ctx.fillStyle='rgba(0,0,0,'+G.transition+')';ctx.fillRect(0,0,W,H);}
  } else {
    // ── OUTDOOR MODE — draw world with camera offset ──
    ctx.save();
    ctx.translate(-G.camX,-G.camY);

    // Draw background (big world)
    if(G.activeWorld==='space') drawSpace();
    else if(G.scene==='garden') drawGarden();
    else if(G.scene==='beach') drawBeach();
    else drawNight();

    // Scene coins
    SCENE_COINS.forEach((c,i)=>{
      if(c.col)return;
      const cx2=c.x*G.worldW, cy2=c.y*G.worldH, bob=Math.sin(t*1.5+i)*5;
      ctx.save();ctx.translate(cx2,cy2+bob);
      ctx.fillStyle='#FFD700';ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,11,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.font='bold 14px serif';ctx.textAlign='center';ctx.fillText('🪙',0,4);
      ctx.restore();
    });

    // NPCs
    NPCS.forEach(npc=>{
      const nx=npc.x*G.worldW, ny=npc.y*G.worldH, bob=Math.sin(t+npc.x*5)*5;
      ctx.save();ctx.translate(nx,ny+bob);
      ctx.fillStyle=npc.id==='zara'?'#A855F7':npc.id==='fox'?'#FB923C':'#FF6B9D';
      ctx.strokeStyle='#3D1A5C';ctx.lineWidth=2;
      ctx.beginPath();ctx.ellipse(0,14,18,24,0,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.font='26px serif';ctx.textAlign='center';ctx.fillText(npc.icon,0,2);
      const lw=ctx.measureText(npc.name).width+14;
      ctx.fillStyle='white';ctx.beginPath();ctx.roundRect(-lw/2,-40,lw,18,7);ctx.fill();
      ctx.strokeStyle='#3D1A5C';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#3D1A5C';ctx.font='bold 10px Nunito';ctx.textAlign='center';ctx.fillText(npc.name,0,-27);
      if(G.nearNPC===npc.id){ctx.fillStyle='#FFD700';ctx.font='bold 11px Nunito';ctx.fillText('Tap to chat!',0,-52);}
      ctx.restore();
    });

    // Pet follows avatar
    const petFn=PETS[G.pet||'bunny']?.draw||drawBunny;
    const petOffX = G.facing==='right'?-70:70;
    petFn(ctx,G.ax*G.worldW+petOffX,G.ay*G.worldH-10,.55,t);

    // Avatar with walk animation
    const avWx=G.ax*G.worldW, avWy=G.ay*G.worldH;
    const walkSt={...G, moving:G.isWalking, walkFrame:G.walkFrame};
    drawAvatar(avWx,avWy,.75,walkSt);

    // Near building highlight
    if(G.nearBuilding){
      const b=BUILDINGS.find(b=>b.id===G.nearBuilding);
      if(b){
        const bx=b.x*G.worldW,by=b.y*G.worldH,bw=b.w*G.worldW,bh=b.h*G.worldH;
        ctx.fillStyle='rgba(255,215,0,0.15)';ctx.strokeStyle='#FFD700';ctx.lineWidth=3;
        ctx.beginPath();ctx.roundRect(bx,by,bw,bh,6);ctx.fill();ctx.stroke();
        ctx.fillStyle='#FFD700';ctx.font='bold 13px Nunito';ctx.textAlign='center';
        ctx.fillText('🚪 Walk to door!',bx+bw/2,by-10);
      }
    }

    ctx.restore(); // end camera transform

    // Transition overlay
    if(G.transition>0){ctx.fillStyle='rgba(0,0,0,'+G.transition+')';ctx.fillRect(0,0,W,H);}
  }

  requestAnimationFrame(draw);
}
draw();

// ── ENTER / EXIT BUILDING ────────────────────────────────
function enterBuilding(id){
  if(G.transitioning)return;
  G.transitioning=true;
  G.transition=0;
  // Fade to black
  let steps=0;
  const fadeIn=setInterval(()=>{
    G.transition=Math.min(1,G.transition+.08);
    if(++steps>14){
      clearInterval(fadeIn);
      G.indoor=id;
      G.nearBuilding=null;
      document.getElementById('chatBox').style.display='none';
      if(id){
        const bld=BUILDINGS.find(b=>b.id===id);
        showToast('Entered '+bld.label+' ✨');
        // Auto-greet from NPC
        if(bld.interior.npc){
          setTimeout(()=>{
            openIndoorChat(bld.interior.npc,bld);
          },600);
        }
      } else {
        showToast('Back outside! 🌸');
      }
      // Fade out
      const fadeOut=setInterval(()=>{
        G.transition=Math.max(0,G.transition-.08);
        if(G.transition<=0){clearInterval(fadeOut);G.transitioning=false;}
      },30);
    }
  },30);
}

function openIndoorChat(npc,bld){

// ── CHAT ──────────────────────────────────────────────────

function renderItemGrid(){

function buyItem(item){if(G.coins<item.price){showToast('Not enough coins! 🪙');return;}G.coins-=item.price;item.owned=true;G.owned.push(item.id);document.getElementById('coinCount').textContent=G.coins;showToast('Got '+item.name+'! 🎉');renderItemGrid();}

function openWorlds(){

function switchWorld(id){

  G.ax=0.5;G.ay=0.88;G.camX=0;G.camY=0;
  gainXP(15);checkAchievements();
  closeModal();

// ── GAMES ─────────────────────────────────────────────────
let mg={};
function openGames(){
  openModal(`<div class="modal-header"><span style="font-size:24px">🎮</span><div class="modal-title">Mini Games</div></div><button class="modal-close" onclick="closeModal()">✕</button><div class="modal-body game-panel" style="border-radius:0 0 21px 21px;padding:16px;background:#1a1a2e;color:white;display:flex;flex-direction:column;gap:12px">
    <div style="background:#2d2d5e;border-radius:16px;padding:14px"><div style="font-weight:800;font-size:15px;margin-bottom:4px">🃏 Memory Match</div><div style="font-size:12px;color:#aaa;margin-bottom:8px">Match all pairs · +30 🪙</div><button class="gbtn" onclick="startMemory()">Play</button></div>
    <div style="background:#2d2d5e;border-radius:16px;padding:14px"><div style="font-weight:800;font-size:15px;margin-bottom:4px">🔢 Number Dash</div><div style="font-size:12px;color:#aaa;margin-bottom:8px">Answer math · +5 🪙 each</div><button class="gbtn" onclick="startMath()">Play</button></div>
    <div style="background:#2d2d5e;border-radius:16px;padding:14px"><div style="font-weight:800;font-size:15px;margin-bottom:4px">🌈 Color Memory</div><div style="font-size:12px;color:#aaa;margin-bottom:8px">Repeat colors · +3 🪙/round</div><button class="gbtn" onclick="startColor()">Play</button></div>
  </div>`);
}
function startMemory(){const em=['💄','👑','💅','🌸','🎀','💎','🦋','🌈'];mg={cards:[...em,...em].sort(()=>Math.random()-.5).map((e,i)=>({id:i,e,f:false,m:false})),fl:[],moves:0,matched:0};renderMem();}
function renderMem(){let h=`<div class="modal-header"><span style="font-size:24px">🃏</span><div class="modal-title">Memory Match</div></div><button class="modal-close" onclick="openGames()">✕</button><div class="modal-body game-panel" style="padding:16px;border-radius:0 0 21px 21px;background:#1a1a2e;color:white"><div style="font-size:13px;color:#aaa;margin-bottom:12px">Moves: ${mg.moves} · Matched: ${mg.matched}/8</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">`;mg.cards.forEach(c=>{h+=`<div class="mem-card${c.f?' flipped':''}${c.m?' matched':''}" onclick="flipMem(${c.id})">${c.f||c.m?c.e:'❓'}</div>`;});h+=`</div>${mg.matched===8?'<div style="text-align:center;font-size:20px;font-weight:900;color:#FFD700;margin-top:12px">🎉 You won! +30 🪙</div>':''}</div>`;openModal(h);}
function flipMem(id){if(mg.fl.length===2)return;const c=mg.cards.find(c=>c.id===id);if(!c||c.f||c.m)return;c.f=true;mg.fl.push(c);if(mg.fl.length===2){mg.moves++;if(mg.fl[0].e===mg.fl[1].e){mg.fl.forEach(c=>c.m=true);mg.matched++;mg.fl=[];if(mg.matched===8){G.coins+=30;document.getElementById('coinCount').textContent=G.coins;showToast('+30 🪙 You won! 🎉');}}else setTimeout(()=>{mg.fl.forEach(c=>c.f=false);mg.fl=[];renderMem();},700);}renderMem();}
function startMath(){const ops=['+','-','×'],op=ops[Math.floor(Math.random()*3)];let a=Math.floor(Math.random()*12)+1,b=Math.floor(Math.random()*12)+1,ans;if(op==='+')ans=a+b;else if(op==='-'){if(a<b)[a,b]=[b,a];ans=a-b;}else{b=Math.floor(Math.random()*9)+1;ans=a*b;}const w=[ans+Math.ceil(Math.random()*5),ans-Math.ceil(Math.random()*4),ans+Math.ceil(Math.random()*8)].filter(v=>v!==ans&&v>0);const ch=[ans,...w.slice(0,3)].sort(()=>Math.random()-.5);openModal(`<div class="modal-header"><span style="font-size:24px">🔢</span><div class="modal-title">Number Dash</div></div><button class="modal-close" onclick="openGames()">✕</button><div class="modal-body game-panel" style="padding:20px;border-radius:0 0 21px 21px;background:#1a1a2e;color:white"><div style="font-size:44px;font-weight:900;text-align:center;margin:10px 0 20px;color:#FFD700">${a} ${op} ${b} = ?</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${ch.map(c=>`<button class="gbtn" style="font-size:24px;padding:16px" onclick="checkMath(${c},${ans})">${c}</button>`).join('')}</div></div>`);}
function checkMath(p,a){if(p===a){G.coins+=5;G.totalCoins+=5;document.getElementById('coinCount').textContent=G.coins;gainXP(5);G.gamesPlayed=(G.gamesPlayed||0)+1;checkAchievements();showToast('+5 🪙 +5 XP! 🎉');startMath();}else{showToast('Wrong! Try again 😅');startMath();}}
let cs=[],ci=[],cp='show';
function startColor(){cs=[];ci=[];cp='show';addCR();}
function addCR(){const cols=['#F87171','#A855F7','#34D399','#FCD34D','#60A5FA'];cs.push(cols[Math.floor(Math.random()*cols.length)]);cp='show';ci=[];showCG2(-1);let i=0;function s(){if(i>0)showCG2(-1);if(i>=cs.length){cp='input';showCG2(-1);return;}showCG2(i);setTimeout(s,700);i++;}setTimeout(s,400);}
function showCG2(hl){const cols=['#F87171','#A855F7','#34D399','#FCD34D','#60A5FA'];openModal(`<div class="modal-header"><span style="font-size:24px">🌈</span><div class="modal-title">Color Memory</div></div><button class="modal-close" onclick="openGames()">✕</button><div class="modal-body game-panel" style="padding:16px;border-radius:0 0 21px 21px;background:#1a1a2e;color:white"><div style="font-size:13px;color:#aaa;margin-bottom:12px">${cp==='show'?'Watch...':'Your turn! Round '+cs.length}</div><div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">${cs.map((c,i)=>`<div style="width:22px;height:22px;border-radius:50%;background:${hl===i?c:'#444'};border:2px solid #666"></div>`).join('')}</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">${cols.map(c=>`<div onclick="ccl('${c}')" style="width:100%;aspect-ratio:1;border-radius:12px;background:${c};cursor:pointer;border:2.5px solid #3D1A5C"></div>`).join('')}</div></div>`);}
function ccl(c){if(cp!=='input')return;const i=ci.length;ci.push(c);if(c!==cs[i]){showToast('Wrong! 😅');setTimeout(startColor,900);return;}if(ci.length===cs.length){G.coins+=cs.length*3;document.getElementById('coinCount').textContent=G.coins;showToast(`+${cs.length*3} 🪙 Keep going!`);setTimeout(addCR,700);}}
